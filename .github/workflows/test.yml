name: Tests

on: [push]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r backend/requirements.txt pytest pytest-django
      - run: python backend/manage.py check
      - run: python backend/manage.py makemigrations --check --dry-run
      - run: pytest tests/ -v
        env:
          DJANGO_SETTINGS_MODULE: taskmanager.settings
          PYTHONPATH: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: cd frontend && npm install && npm run build
